name: Android UI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🚀 Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔧 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 📥 Install Telegram on emulator
        run: |
          wget -O telegram.apk https://apkcombo.com/telegram/download/apk
          adb install telegram.apk || echo "Telegram installation failed"

      - name: 📥 Install YouTube on emulator
        run: |
          wget -O youtube.apk https://apkcombo.com/youtube/download/apk
          adb install youtube.apk || echo "YouTube installation failed"

      - name: 🧪 Run UI tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 5X
          script: ./gradlew connectedCheck

      - name: 📤 Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/

name: Android Smoke Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create dummy report
        run: |
          mkdir -p reports
          echo "✅ Тест пройден" > reports/result.txt
          cat reports/result.txt

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/
